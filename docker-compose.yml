version: '3.8'

services:
  omr_app:
    build: .
    container_name: music_sheet_to_mp3_app
    ports:
      - "8501:8501"
    shm_size: '4gb'

    volumes:
      - ./temp_ai:/tmp
      - ./tests/current_test:/app/tests/current_test
      # --- DATASETS ---
      - ./dataset/big_dataset:/app/dataset/big_dataset
      - ./dataset/minor_dataset:/app/dataset/minor_dataset
      - ./dataset/doremi:/app/dataset/doremi
      - ./dataset/barline_yolo:/app/dataset/barline_yolo
      # --- HOT-RELOADING ---
      # Mount source files directly so changes saved locally are reflected
      # inside the container without a full Docker image rebuild.
      - ./app.py:/app/app.py
      - ./core:/app/core
      - ./models:/app/models
      - ./training:/app/training

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # --- STREAMLIT HOT-RELOAD ---
      # 'poll' watcher works reliably with Docker volume mounts on Windows (inotify not available).
      # runOnSave triggers an automatic rerun whenever a mounted .py file is saved.
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=poll
      - STREAMLIT_SERVER_RUN_ON_SAVE=true
    restart: unless-stopped
